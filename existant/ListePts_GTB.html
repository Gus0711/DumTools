<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liste de Points GTB</title>
<style>
  :root{
    /* Identité Dumortier · Groupe Fareneit */
    --brand-blue:#2b3a8f; --brand-blue-d:#1e2a66; --brand-blue-soft:#e7e9f4;
    --brand-orange:#ee7d1b; --brand-orange-d:#cf6a0e; --brand-orange-soft:#fdeedd;
    --brand-grey:#8b94a3;
    --ink:#16202b; --ink-soft:#3b4654; --muted:#7c8896;
    --line:#dfe3e8; --line-soft:#eceef1;
    --panel:#f4f6f8; --surface:#ffffff; --surface-2:#fafbfc;
    --accent:#2b3a8f; --accent-d:#1e2a66; --accent-soft:#e7e9f4;
    --band:#2b3a8f; --band-ink:#ffffff;
    --ai:#1f6feb; --di:#b4690e; --ao:#7b41c9; --do:#1a8a4a; --com:#0d8c97;
    --danger:#c0392b;
    --r:8px; --r-sm:5px;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--panel);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:22px 20px 120px}

  /* Masthead */
  .masthead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:2px solid var(--brand-orange);padding-bottom:12px;margin-bottom:18px}
  .title{font-size:23px;font-weight:700;letter-spacing:-.01em;margin:0;text-align:center}
  .title small{display:block;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
  .legend{display:flex;gap:14px;font-family:var(--mono);font-size:10.5px;color:var(--muted)}
  .legend b{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:4px;vertical-align:middle}

  /* Logo officiel Dumortier · Groupe Fareneït */
  .brand-logo{height:76px;width:auto;display:block}

  /* Header form */
  .head-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;display:grid;grid-template-columns:1.6fr 1.6fr .8fr;gap:18px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .field input{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);color:var(--ink)}
  .field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* Combobox */
  .combo{position:relative}
  .combo-list{position:absolute;z-index:40;top:calc(100% + 3px);left:0;right:0;max-height:260px;overflow-y:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(20,32,43,.14);display:none}
  .combo-list.open{display:block}
  .combo-opt{padding:7px 11px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .combo-opt:hover,.combo-opt.active{background:var(--accent-soft)}
  .combo-opt .tag{font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:3px;background:var(--line-soft);color:var(--ink-soft)}
  .combo-opt.special{font-style:italic;color:var(--accent-d);font-weight:600}

  /* Toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 13px;border-radius:var(--r-sm);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.12s}
  button:hover{border-color:var(--accent);color:var(--accent-d)}
  button.primary{background:var(--brand-orange);border-color:var(--brand-orange);color:#fff}
  button.primary:hover{background:var(--brand-orange-d);border-color:var(--brand-orange-d);color:#fff}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  button.ghost:hover{color:var(--danger);border-color:transparent}
  .toolbar .sep{flex:1}
  .tpl-wrap{position:relative}
  .tpl-menu{position:absolute;z-index:40;top:calc(100% + 4px);left:0;min-width:200px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r-sm);box-shadow:0 8px 24px rgba(20,32,43,.14);display:none;overflow:hidden}
  .tpl-menu.open{display:block}
  .tpl-menu div{padding:9px 13px;cursor:pointer;font-size:13px;font-weight:600}
  .tpl-menu div:hover{background:var(--accent-soft);color:var(--accent-d)}

  /* Table */
  .sheet{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--brand-blue-d);color:#fff;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:10px 10px;text-align:left;white-space:nowrap}
  thead th.io{text-align:center;width:48px;font-family:var(--mono);letter-spacing:.02em}
  thead th.grip,thead th.act{width:34px;padding:0}
  tbody td{border-bottom:1px solid var(--line-soft);padding:4px 8px;vertical-align:middle}
  tbody tr:hover{background:var(--surface-2)}
  .grip-c{text-align:center;color:var(--line);cursor:grab;user-select:none;font-size:15px}
  tr.dragging{opacity:.4}
  tr.drop-target td{box-shadow:inset 0 2px 0 var(--accent)}

  .cell-name input,.cell-free input{width:100%;font:inherit;border:1px solid transparent;background:transparent;padding:7px 8px;border-radius:var(--r-sm);color:var(--ink)}
  .cell-name input:focus,.cell-free input:focus{outline:none;border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 2px var(--accent-soft)}
  .cell-free input{color:var(--ink-soft);font-style:italic}

  .io{text-align:center;width:48px}
  .io-cell{width:30px;height:28px;margin:0 auto;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:700;color:transparent;display:flex;align-items:center;justify-content:center;transition:.1s}
  .io-cell:hover{border-color:var(--muted)}
  .io-cell.on{color:#fff}
  .io-cell.AI.on{background:var(--ai);border-color:var(--ai)}
  .io-cell.DI.on{background:var(--di);border-color:var(--di)}
  .io-cell.AO.on{background:var(--ao);border-color:var(--ao)}
  .io-cell.DO.on{background:var(--do);border-color:var(--do)}
  .io-cell.COM.on{background:var(--com);border-color:var(--com)}

  .act-c{text-align:center}
  .row-del{border:none;background:transparent;color:var(--line);padding:4px 6px;font-size:15px}
  .row-del:hover{color:var(--danger);background:transparent}

  /* Section row */
  tr.section td{background:var(--band);padding:0}
  tr.section .sec-inner{display:flex;align-items:center;gap:8px;padding:8px 12px}
  tr.section input{flex:1;font:inherit;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-size:13px;color:var(--band-ink);background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 7px}
  tr.section input::placeholder{color:rgba(255,255,255,.55)}
  tr.section input:focus{outline:none;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4)}
  tr.section .sec-del{color:rgba(255,255,255,.6)}
  tr.section .sec-del:hover{color:#fff}
  tr.section .grip-c{color:rgba(255,255,255,.4)}

  /* Totals */
  tfoot td{border-top:2px solid var(--ink);padding:12px 10px;font-weight:700;background:var(--surface-2)}
  tfoot .lbl{text-transform:uppercase;letter-spacing:.1em;font-size:11px;color:var(--ink-soft)}
  tfoot .tot{text-align:center;font-family:var(--mono);font-size:15px}
  tfoot .grand{text-align:right;font-family:var(--mono);color:var(--muted);font-weight:600;font-size:12px}

  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-style:italic}

  /* Add bar under table */
  .addbar{display:flex;gap:8px;margin-top:12px}

  /* Modal */
  .modal-back{position:fixed;inset:0;background:rgba(22,32,43,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-back.open{display:flex}
  .modal{background:var(--surface);border-radius:var(--r);width:100%;max-width:420px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h3{margin:0 0 4px;font-size:17px}
  .modal p{margin:0 0 16px;color:var(--muted);font-size:13px}
  .modal .field{margin-bottom:14px}
  .modal select{font:inherit;padding:9px 11px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2)}
  .modal-act{display:flex;justify-content:flex-end;gap:8px;margin-top:6px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.25s;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:760px){
    .head-card{grid-template-columns:1fr}
    .legend{display:none}
    thead th.io,.io{width:40px}
  }

  /* Print */
  @media print{
    @page{size:A4;margin:12mm}
    body{background:#fff;font-size:11px}
    .wrap{max-width:none;padding:0}
    .toolbar,.addbar,.grip,.grip-c,.act,.act-c,.legend,.no-print{display:none!important}
    .head-card{border:none;padding:0 0 8px;border-bottom:1.5px solid #000;border-radius:0}
    .field input{border:none;background:none;padding:2px 0;font-weight:600}
    .sheet{border:1px solid #888;border-radius:0}
    thead th{background:#222!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    tr.section td{background:#555!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .io-cell{border:none;background:none!important;color:#000!important}
    .io-cell.on{color:#000!important;font-weight:700}
    .io-cell:not(.on){visibility:hidden}
    .cell-name input,.cell-free input{border:none}
    tbody tr:hover{background:none}
    .masthead{border-bottom:1.5px solid #000}
  }

  /* ===== Rendu d'impression paginé : sous-total par page, total général en dernière page ===== */
  .print-root{display:none}
  @media print{
    .masthead,.head-card,.sheet,.addbar{display:none!important}
    .print-root{display:block}
    .wrap{padding:0}

    .print-page{break-after:page;page-break-after:always}
    .print-page:last-child{break-after:auto;page-break-after:auto}

    .print-head{border-bottom:2px solid var(--brand-orange);padding-bottom:10px;margin-bottom:12px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .print-head-top{display:flex;align-items:center;justify-content:space-between;gap:14px}
    .print-head .brand-logo{height:58px}
    .print-head-top .print-meta{font-size:10px;color:var(--muted)}
    .print-title{text-align:center;margin-top:4px}
    .print-title .print-kicker{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--brand-orange)}
    .print-title .print-client{margin:3px 0 0;font-size:26px;font-weight:800;line-height:1.1;color:var(--brand-blue-d)}
    .print-title .print-chantier{font-size:15px;font-weight:600;color:var(--ink-soft);margin-top:2px}

    table.print-table{width:100%;border-collapse:collapse;font-size:10.5px;table-layout:fixed}
    .print-table thead th{background:var(--brand-blue-d)!important;color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:5px 7px;text-align:left;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase}
    .print-table thead th.io{text-align:center;width:38px}
    .print-table tbody td{border-bottom:1px solid #d7dbe0;padding:3px 7px}
    .print-table tbody tr{break-inside:avoid;page-break-inside:avoid}
    .print-table td.io{text-align:center;width:38px;padding:2px 3px}
    .print-table .io-chip{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:16px;padding:0 4px;border-radius:3px;color:#fff;font-family:var(--mono);font-size:8.5px;font-weight:700;line-height:1;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .print-table .io-chip.AI{background:var(--ai)}
    .print-table .io-chip.DI{background:var(--di)}
    .print-table .io-chip.AO{background:var(--ao)}
    .print-table .io-chip.DO{background:var(--do)}
    .print-table .io-chip.COM{background:var(--com)}
    .print-table td.free{color:#555;font-style:italic}
    .print-table tr.p-section td{background:var(--brand-blue)!important;color:#fff;font-weight:700;text-transform:uppercase;letter-spacing:.04em;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:4px 8px;font-size:10px}

    .print-foot td{border-top:1.6px solid var(--brand-blue-d);background:var(--brand-blue-soft)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:6px 7px;font-weight:700}
    .print-foot.grand td{background:var(--brand-orange-soft)!important;border-top:2px solid var(--brand-orange)}
    .print-foot .io{text-align:center;font-family:var(--mono);color:var(--brand-blue-d)}
    .print-foot .lbl{text-transform:uppercase;letter-spacing:.07em;font-size:9.5px}
    .print-foot .cnt{font-size:9.5px;color:var(--ink-soft);font-style:italic;font-weight:600}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="masthead">
    <img id="brandLogo" class="brand-logo" alt="Dumortier · Groupe Fareneït">
    <h1 class="title"><small>GTB / GTC</small>Liste de Points</h1>
    <div class="legend">
      <span><b style="background:var(--ai)"></b>AI&nbsp;entrée ana.</span>
      <span><b style="background:var(--di)"></b>DI&nbsp;entrée TOR</span>
      <span><b style="background:var(--ao)"></b>AO&nbsp;sortie ana.</span>
      <span><b style="background:var(--do)"></b>DO&nbsp;sortie TOR</span>
      <span><b style="background:var(--com)"></b>COM&nbsp;bus</span>
    </div>
  </div>

  <div class="head-card">
    <div class="field combo" id="clientCombo">
      <label for="clientInput">Client</label>
      <input id="clientInput" type="text" placeholder="Rechercher un client…" autocomplete="off">
      <div class="combo-list" id="clientList"></div>
    </div>
    <div class="field">
      <label for="chantierInput">Chantier</label>
      <input id="chantierInput" type="text" placeholder="Nom du chantier / site">
    </div>
    <div class="field">
      <label for="dateInput">Date</label>
      <input id="dateInput" type="date">
    </div>
  </div>

  <div class="toolbar no-print">
    <button class="primary" onclick="addPoint()">＋ Point</button>
    <button onclick="addSection()">＋ Section</button>
    <div class="tpl-wrap">
      <button onclick="toggleTplMenu(event)">▾ Insérer un modèle</button>
      <div class="tpl-menu" id="tplMenu"></div>
    </div>
    <button onclick="openNewPoint()">＋ Nouveau type de point</button>
    <span class="sep"></span>
    <button onclick="window.print()">Imprimer / PDF</button>
    <button class="ghost" onclick="newDoc()">Nouveau document</button>
  </div>

  <div class="sheet">
    <table>
      <thead>
        <tr>
          <th class="grip"></th>
          <th>Nom du point</th>
          <th>Texte libre</th>
          <th class="io">AI</th><th class="io">DI</th><th class="io">AO</th><th class="io">DO</th><th class="io">COM</th>
          <th class="act"></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
      <tfoot>
        <tr>
          <td></td>
          <td class="lbl">Points physiques : <span id="ptCount" class="grand">0</span></td>
          <td class="grand" id="grandTotal">0 E/S</td>
          <td class="tot" id="totAI">0</td>
          <td class="tot" id="totDI">0</td>
          <td class="tot" id="totAO">0</td>
          <td class="tot" id="totDO">0</td>
          <td class="tot" id="totCOM">0</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div class="addbar no-print">
    <button class="primary" onclick="addPoint()">＋ Ajouter un point</button>
    <button onclick="addSection()">＋ Ajouter une section</button>
  </div>
</div>

<!-- New point modal -->
<div class="modal-back" id="npModal">
  <div class="modal">
    <h3>Nouveau type de point</h3>
    <p>Ajoute un point à la base. Il sera ensuite proposé dans la liste déroulante.</p>
    <div class="field">
      <label>Nom du point</label>
      <input id="npName" type="text" placeholder="Ex : Sonde gaine soufflage">
    </div>
    <div class="field">
      <label>Type d'E/S</label>
      <select id="npType">
        <option value="AI">AI — Entrée analogique</option>
        <option value="DI">DI — Entrée TOR</option>
        <option value="AO">AO — Sortie analogique</option>
        <option value="DO">DO — Sortie TOR</option>
        <option value="COM">COM — Point bus / communication</option>
      </select>
    </div>
    <div class="modal-act">
      <button onclick="closeNewPoint()">Annuler</button>
      <button class="primary" onclick="saveNewPoint()">Ajouter le point</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---------- toast ---------- */
let toastT;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1900);}

/* ---------- date default ---------- */
$('#dateInput').valueAsDate = new Date();

/* ---------- Client combobox ---------- */
function setupClientCombo(){
  const input=$('#clientInput'), list=$('#clientList');
  let active=-1, items=[];
  function render(filter){
    const f=(filter||'').toLowerCase().trim();
    items = DB.clients.filter(c=>c.toLowerCase().includes(f));
    list.innerHTML = items.length ? items.map((c,i)=>`<div class="combo-opt" data-i="${i}">${esc(c)}</div>`).join('')
                                  : `<div class="combo-opt" style="color:var(--muted);font-style:italic">Aucun client — saisie libre conservée</div>`;
    active=-1;
  }
  function open(){render(input.value);list.classList.add('open');}
  function close(){list.classList.remove('open');}
  input.addEventListener('focus',open);
  input.addEventListener('input',()=>{render(input.value);list.classList.add('open');save();});
  input.addEventListener('keydown',e=>{
    const opts=[...list.querySelectorAll('.combo-opt[data-i]')];
    if(e.key==='ArrowDown'){e.preventDefault();active=Math.min(active+1,opts.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();active=Math.max(active-1,0);}
    else if(e.key==='Enter'){if(active>=0&&items[active]){input.value=items[active];close();save();}return;}
    else if(e.key==='Escape'){close();return;}
    opts.forEach((o,i)=>o.classList.toggle('active',i===active));
    if(opts[active])opts[active].scrollIntoView({block:'nearest'});
  });
  list.addEventListener('mousedown',e=>{const o=e.target.closest('.combo-opt[data-i]');if(!o)return;input.value=items[+o.dataset.i];close();save();});
  document.addEventListener('click',e=>{if(!$('#clientCombo').contains(e.target))close();});
}

/* ---------- rendering rows ---------- */
function render(){
  const tb=$('#rows');
  if(!rows.length){tb.innerHTML=`<tr><td colspan="9" class="empty">Aucun point. Commence par « ＋ Point », « ＋ Section » ou insère un modèle.</td></tr>`;updateTotals();return;}
  tb.innerHTML='';
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    tr.dataset.id=r.id;
    tr.draggable=true;
    if(r.kind==='section'){
      tr.className='section';
      tr.innerHTML=`<td class="grip-c" title="Glisser pour déplacer">⠿</td>
        <td colspan="7"><div class="sec-inner">
          <input type="text" value="${esc(r.name)}" placeholder="Titre de section" oninput="onSectionName(${r.id},this.value)">
        </div></td>
        <td class="act-c"><button class="row-del sec-del" title="Supprimer" onclick="delRow(${r.id})">✕</button></td>`;
    }else{
      tr.innerHTML=`<td class="grip-c" title="Glisser pour déplacer">⠿</td>
        <td class="cell-name"></td>
        <td class="cell-free"><input type="text" value="${esc(r.free)}" placeholder="—" oninput="onFree(${r.id},this.value)"></td>
        ${IO.map(t=>`<td class="io"><div class="io-cell ${t} ${r.io[t]?'on':''}" onclick="toggleIO(${r.id},'${t}')">${t}</div></td>`).join('')}
        <td class="act-c"><button class="row-del" title="Supprimer" onclick="delRow(${r.id})">✕</button></td>`;
      tr.querySelector('.cell-name').appendChild(buildNameCombo(r));
    }
    tb.appendChild(tr);
  });
  bindDnD();
  updateTotals();
}

function buildNameCombo(r){
  const wrap=document.createElement('div');wrap.className='combo';
  const input=document.createElement('input');
  input.type='text';input.value=r.name;input.placeholder='Choisir un point…';input.autocomplete='off';
  const list=document.createElement('div');list.className='combo-list';
  wrap.appendChild(input);wrap.appendChild(list);
  let items=[],active=-1;
  function build(filter){
    const f=(filter||'').toLowerCase().trim();
    const matches=DB.points.filter(p=>p.name.toLowerCase().includes(f));
    items=[{name:'Divers',type:null,special:'libre'}].concat(matches);
    list.innerHTML=items.map((p,i)=>{
      if(p.special) return `<div class="combo-opt special" data-i="${i}">＋ Divers (texte libre)</div>`;
      return `<div class="combo-opt" data-i="${i}">${esc(p.name)}<span class="tag">${p.type||''}</span></div>`;
    }).join('');
    active=-1;
  }
  function open(){build(input.value);list.classList.add('open');}
  function close(){list.classList.remove('open');}
  function choose(p){
    if(p.special){ r.name='Divers'; IO.forEach(t=>r.io[t]=0); }
    else { r.name=p.name; IO.forEach(t=>r.io[t]= (p.type===t)?1:0); }
    close();render();save();
  }
  input.addEventListener('focus',open);
  input.addEventListener('input',()=>{r.name=input.value;build(input.value);list.classList.add('open');save();});
  input.addEventListener('keydown',e=>{
    const opts=[...list.querySelectorAll('.combo-opt[data-i]')];
    if(e.key==='ArrowDown'){e.preventDefault();active=Math.min(active+1,opts.length-1);}
    else if(e.key==='ArrowUp'){e.preventDefault();active=Math.max(active-1,0);}
    else if(e.key==='Enter'){e.preventDefault();if(active>=0)choose(items[active]);else close();return;}
    else if(e.key==='Escape'){close();return;}
    opts.forEach((o,i)=>o.classList.toggle('active',i===active));
    if(opts[active])opts[active].scrollIntoView({block:'nearest'});
  });
  list.addEventListener('mousedown',e=>{const o=e.target.closest('.combo-opt[data-i]');if(!o)return;e.preventDefault();choose(items[+o.dataset.i]);});
  input.addEventListener('blur',()=>setTimeout(close,150));
  return wrap;
}

/* ---------- row ops ---------- */
function addPoint(){rows.push({id:uid++,kind:'point',name:'',free:'',io:{AI:0,DI:0,AO:0,DO:0,COM:0}});render();save();focusLast('.cell-name input');}
function addSection(name){rows.push({id:uid++,kind:'section',name:name||''});render();save();focusLast('tr.section input');}
function focusLast(sel){const els=document.querySelectorAll('#rows '+sel);if(els.length)els[els.length-1].focus();}
function delRow(id){rows=rows.filter(r=>r.id!==id);render();save();}
function toggleIO(id,t){const r=rows.find(x=>x.id===id);if(!r)return;r.io[t]=r.io[t]?0:1;render();save();}
function onFree(id,v){const r=rows.find(x=>x.id===id);if(r){r.free=v;save();}}
function onSectionName(id,v){const r=rows.find(x=>x.id===id);if(r){r.name=v;save();}}

/* ---------- totals ---------- */
function updateTotals(){
  const t={AI:0,DI:0,AO:0,DO:0,COM:0};let pts=0;
  rows.forEach(r=>{if(r.kind==='point'){IO.forEach(k=>t[k]+=r.io[k]?1:0);if(ES.some(k=>r.io[k]))pts++;}});
  IO.forEach(k=>$('#tot'+k).textContent=t[k]);
  $('#ptCount').textContent=pts;
  const g=ES.reduce((s,k)=>s+t[k],0); // COM exclu du total E/S
  $('#grandTotal').textContent=g+' E/S · '+t.COM+' objet'+(t.COM>1?'s':'')+' communicant'+(t.COM>1?'s':'');
}

/* ---------- templates ---------- */
function buildTplMenu(){
  const m=$('#tplMenu');
  m.innerHTML=Object.keys(DB.templates).map(name=>`<div onclick="insertTemplate('${esc(name).replace(/'/g,"\\'")}')">${esc(name)}</div>`).join('');
}
function toggleTplMenu(e){e.stopPropagation();$('#tplMenu').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('.tpl-wrap'))$('#tplMenu').classList.remove('open');});
function insertTemplate(name){
  const pts=DB.templates[name]||[];
  rows.push({id:uid++,kind:'section',name});
  pts.forEach(pn=>{
    const def=DB.points.find(p=>p.name===pn);
    const io={AI:0,DI:0,AO:0,DO:0,COM:0};
    if(def&&def.type)io[def.type]=1;
    rows.push({id:uid++,kind:'point',name:pn,free:'',io});
  });
  $('#tplMenu').classList.remove('open');
  render();save();toast('Modèle « '+name+' » inséré');
}

/* ---------- new point ---------- */
function openNewPoint(){$('#npName').value='';$('#npType').value='AI';$('#npModal').classList.add('open');setTimeout(()=>$('#npName').focus(),50);}
function closeNewPoint(){$('#npModal').classList.remove('open');}
function saveNewPoint(){
  const name=$('#npName').value.trim();const type=$('#npType').value;
  if(!name){toast('Donne un nom au point');return;}
  if(DB.points.some(p=>p.name.toLowerCase()===name.toLowerCase())){toast('Ce point existe déjà');return;}
  DB.points.push({name,type});
  DB.points.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  closeNewPoint();save();toast('Point « '+name+' » ajouté à la base');
}

/* ---------- persistence ---------- */
function state(){return{client:$('#clientInput').value,chantier:$('#chantierInput').value,date:$('#dateInput').value,rows,uid,customPoints:DB.points.filter(p=>!p._builtin)};}
function save(){updateTotals();try{localStorage.setItem('gtb_listepts',JSON.stringify(state()));}catch(e){}}
function restore(){
  try{
    const s=JSON.parse(localStorage.getItem('gtb_listepts'));
    if(!s)return false;
    $('#clientInput').value=s.client||'';$('#chantierInput').value=s.chantier||'';
    if(s.date)$('#dateInput').value=s.date;
    rows=s.rows||[];uid=s.uid||(rows.length+1);
    (s.customPoints||[]).forEach(cp=>{if(!DB.points.some(p=>p.name===cp.name))DB.points.push(cp);});
    return true;
  }catch(e){return false;}
}
function newDoc(){
  if(!confirm('Créer un nouveau document ? Les données saisies seront effacées.'))return;
  rows=[];uid=1;$('#clientInput').value='';$('#chantierInput').value='';$('#dateInput').valueAsDate=new Date();
  render();save();toast('Nouveau document');
}

/* ---------- drag & drop reorder ---------- */
let dragId=null;
function bindDnD(){
  document.querySelectorAll('#rows tr').forEach(tr=>{
    tr.addEventListener('dragstart',e=>{dragId=+tr.dataset.id;tr.classList.add('dragging');});
    tr.addEventListener('dragend',()=>{dragId=null;document.querySelectorAll('#rows tr').forEach(x=>x.classList.remove('dragging','drop-target'));});
    tr.addEventListener('dragover',e=>{e.preventDefault();tr.classList.add('drop-target');});
    tr.addEventListener('dragleave',()=>tr.classList.remove('drop-target'));
    tr.addEventListener('drop',e=>{e.preventDefault();const tgt=+tr.dataset.id;if(dragId==null||dragId===tgt)return;
      const from=rows.findIndex(r=>r.id===dragId),to=rows.findIndex(r=>r.id===tgt);
      const [m]=rows.splice(from,1);rows.splice(to,0,m);render();save();});
  });
}

/* ---------- util ---------- */
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- impression paginée : sous-total/page + total général ---------- */
function fmtDate(v){if(!v)return '—';const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('fr-FR');}
function buildPrintHeader(){
  const h=document.createElement('div');h.className='print-head';
  const client=$('#clientInput').value.trim()||'—';
  const chantier=$('#chantierInput').value.trim()||'—';
  h.innerHTML=`<div class="print-head-top">`+
      `<img class="brand-logo" src="${LOGO_SRC}" alt="Dumortier · Groupe Fareneït">`+
      `<div class="print-meta">${fmtDate($('#dateInput').value)}</div>`+
    `</div>`+
    `<div class="print-title">`+
      `<div class="print-kicker">Liste de Points &middot; GTB / GTC</div>`+
      `<h2 class="print-client">${esc(client)}</h2>`+
      `<div class="print-chantier">${esc(chantier)}</div>`+
    `</div>`;
  return h;
}
function printTheadHTML(){
  return `<thead><tr><th>Nom du point</th><th>Texte libre</th>`+
    IO.map(t=>`<th class="io">${t}</th>`).join('')+`</tr></thead>`;
}
function buildPrintRow(r){
  const tr=document.createElement('tr');
  if(r.kind==='section'){tr.className='p-section';tr.innerHTML=`<td colspan="7">${esc(r.name||'')}</td>`;}
  else{tr.innerHTML=`<td>${esc(r.name||'')}</td><td class="free">${esc(r.free||'')}</td>`+
    IO.map(t=>`<td class="io">${(r.io&&r.io[t])?`<span class="io-chip ${t}">${t}</span>`:''}</td>`).join('');}
  return tr;
}
function buildPrintFoot(label,sums,isGrand,count){
  const tf=document.createElement('tfoot');
  const total=ES.reduce((s,k)=>s+(sums[k]||0),0); // COM exclu du total E/S
  const com=sums.COM||0;
  const tr=document.createElement('tr');tr.className='print-foot'+(isGrand?' grand':'');
  tr.innerHTML=`<td class="lbl">${esc(label)}${isGrand?(' — '+total+' E/S'):''}</td>`+
    `<td class="cnt">${count} pt${count>1?'s':''} · ${com} objet${com>1?'s':''} communicant${com>1?'s':''}</td>`+
    IO.map(k=>`<td class="io">${sums[k]||0}</td>`).join('');
  tf.appendChild(tr);return tf;
}
function buildPrintPages(){
  if(!rows.length)return;
  let root=document.getElementById('printRoot');
  if(!root){root=document.createElement('div');root.id='printRoot';root.className='print-root';document.body.appendChild(root);}
  root.innerHTML='';

  const PXMM=96/25.4;
  const PAGE_H=(297-24)*PXMM;   // hauteur imprimable A4 (marges 12mm)
  const SAFETY=28;             // marge anti-débordement

  const meas=document.createElement('div');
  meas.style.cssText='position:absolute;left:-10000px;top:0;width:186mm;visibility:hidden';
  document.body.appendChild(meas);

  const header=buildPrintHeader();meas.appendChild(header);
  const headerH=header.getBoundingClientRect().height;

  const mt=document.createElement('table');mt.className='print-table';mt.innerHTML=printTheadHTML();
  const mtb=document.createElement('tbody');mt.appendChild(mtb);meas.appendChild(mt);
  const theadH=mt.querySelector('thead').getBoundingClientRect().height;

  const items=rows.map(r=>{const tr=buildPrintRow(r);mtb.appendChild(tr);return{r,tr,h:tr.getBoundingClientRect().height};});

  const sampleFoot=buildPrintFoot('Sous-total',{AI:0,DI:0,AO:0,DO:0,COM:0},false,0);
  mt.appendChild(sampleFoot);const footH=sampleFoot.getBoundingClientRect().height;mt.removeChild(sampleFoot);

  // répartition gloutonne en pages
  const pages=[];let cur=[],used=0,first=true;
  const budget=()=>PAGE_H-theadH-footH-SAFETY-(first?headerH:0);
  items.forEach(it=>{
    if(cur.length&&used+it.h>budget()){pages.push(cur);cur=[];used=0;first=false;}
    cur.push(it);used+=it.h;
  });
  if(cur.length)pages.push(cur);

  // éviter un titre de section orphelin en bas de page
  for(let i=0;i<pages.length-1;i++){
    const pg=pages[i];
    if(pg.length&&pg[pg.length-1].r.kind==='section'){pages[i+1].unshift(pg.pop());}
  }

  // total général
  const g={AI:0,DI:0,AO:0,DO:0,COM:0};let gpts=0;
  rows.forEach(r=>{if(r.kind==='point'){IO.forEach(k=>g[k]+=r.io[k]?1:0);if(ES.some(k=>r.io[k]))gpts++;}});

  pages.forEach((pg,idx)=>{
    const isLast=idx===pages.length-1;
    const page=document.createElement('div');page.className='print-page';
    if(idx===0)page.appendChild(header);
    const table=document.createElement('table');table.className='print-table';table.innerHTML=printTheadHTML();
    const tb=document.createElement('tbody');
    const sub={AI:0,DI:0,AO:0,DO:0,COM:0};let pts=0;
    pg.forEach(it=>{tb.appendChild(it.tr);if(it.r.kind==='point'){IO.forEach(k=>sub[k]+=it.r.io[k]?1:0);if(ES.some(k=>it.r.io[k]))pts++;}});
    table.appendChild(tb);
    table.appendChild(isLast?buildPrintFoot('Total général',g,true,gpts)
                            :buildPrintFoot('Sous-total page '+(idx+1),sub,false,pts));
    page.appendChild(table);
    root.appendChild(page);
  });

  document.body.removeChild(meas);
}
window.addEventListener('beforeprint',buildPrintPages);

/* ---------- init ---------- */
DB.points.forEach(p=>p._builtin=true);
DB.points.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
setupClientCombo();
buildTplMenu();
if(!restore()){addSection('Généralité');}
render();
const _bl=document.getElementById('brandLogo');if(_bl)_bl.src=LOGO_SRC;
['#clientInput','#chantierInput','#dateInput'].forEach(s=>$(s).addEventListener('change',save));
</script>
</body>
