# Déploiement production (VM Proxmox interne).
# Prérequis : un fichier .env.prod (voir .env.prod.example) à côté de ce fichier.
#   docker compose --env-file .env.prod up -d --build
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dumtools
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dumtools
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumtools -d dumtools"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Applique les migrations avant de démarrer l'app (cible builder = prisma CLI dispo).
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://dumtools:${POSTGRES_PASSWORD}@postgres:5432/dumtools?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://dumtools:${POSTGRES_PASSWORD}@postgres:5432/dumtools?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      # Outil « Documents » (GED) / kDrive. Le spool est un volume persistant :
      # les dépôts en attente survivent à un redéploiement (kDrive maître seul).
      DOCUMENTS_SPOOL_DIR: /data/spool
      DOCUMENTS_DRAIN_SECRET: ${DOCUMENTS_DRAIN_SECRET}
      KDRIVE_TOKEN: ${KDRIVE_TOKEN:-}
      KDRIVE_DRIVE_ID: ${KDRIVE_DRIVE_ID:-}
      KDRIVE_ROOT_DIR_ID: ${KDRIVE_ROOT_DIR_ID:-}
      KDRIVE_API_VERSION: ${KDRIVE_API_VERSION:-3}
      # Médias des outils Visites et Notes : binaires DURABLES sur la VM →
      # volumes persistants (sinon photos/pièces jointes perdues au
      # redéploiement, fiches en « fichier absent » 410). À sauvegarder avec
      # Postgres (voir scripts/backup-db.sh).
      VISITES_MEDIA_DIR: /data/visites-media
      NOTES_MEDIA_DIR: /data/notes-media
      # Médias des pages du Wiki (images collées, pièces jointes) — durables,
      # 100 % interne (aucune route publique). Même logique de sauvegarde.
      WIKI_MEDIA_DIR: /data/wiki-media
    volumes:
      - spool_data:/data/spool
      - visites_media:/data/visites-media
      - notes_media:/data/notes-media
      - wiki_media:/data/wiki-media
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "3000"

  # Worker de synchro kDrive : draine la file toutes les 2 min (asynchrone + retry).
  # La route /api/documents/drain est protégée par DOCUMENTS_DRAIN_SECRET et exclue
  # de l'auth du proxy. Le claim atomique côté app évite tout double-push.
  documents-sync:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      DOCUMENTS_DRAIN_SECRET: ${DOCUMENTS_DRAIN_SECRET}
    depends_on:
      - app
    command: >
      sh -c 'apk add --no-cache curl >/dev/null 2>&1;
             while true; do
               sleep 120;
               curl -fsS -X POST
                 -H "Authorization: Bearer $$DOCUMENTS_DRAIN_SECRET"
                 http://app:3000/api/documents/drain >/dev/null 2>&1 || true;
             done'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pg_data:
  caddy_data:
  caddy_config:
  spool_data:
  visites_media:
  notes_media:
  wiki_media:
